name: Reusable Microservice CI

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      image_name:
        required: true
        type: string
      dockerfile_path:
        required: false
        default: "."
        type: string
      node_version:
        required: false
        default: "20"
        type: string
      snyk_severity_threshold:
        required: false
        default: "high"
        type: string
      sonar_key:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_URL:              # matches exact secret name stored in your GitHub org
        required: true
      SNYK_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      TOKEN:
        required: true
      EMAIL_USERNAME:
        required: true
      EMAIL_PASSWORD:
        required: true

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Security & Quality Scans
  # ─────────────────────────────────────────────
  security-scan:
    name: Security & Quality Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          # cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Tests with Coverage
        continue-on-error: true
        run: npm run test:ci  

      - name: SonarQube Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}   # env var name the action expects = SONAR_HOST_URL
                                                      # secret name in GitHub             = SONAR_URL
        with:
          args: -Dsonar.projectKey=${{ inputs.sonar_key }}

      - name: SonarQube Quality Gate
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}   # same pattern — action needs SONAR_HOST_URL env var

      - name: Snyk Open Source Scan
        continue-on-error: true
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=${{ inputs.snyk_severity_threshold }} --all-projects

  # ─────────────────────────────────────────────
  # JOB 2 — Build Docker Image & Container Scan
  # ─────────────────────────────────────────────
  build-and-scan:
    name: Build & Container Scan
    needs: security-scan
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.prep.outputs.tag }}
      service_name: ${{ steps.prep.outputs.service_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Metadata
        id: prep
        shell: bash
        run: |
          echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          echo "service_name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.dockerfile_path }}
          push: false
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ steps.prep.outputs.tag }}
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ steps.prep.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Vulnerability Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ steps.prep.outputs.tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Push Image to GHCR
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ steps.prep.outputs.tag }}

      - name: Push Image to DockerHub
        if: github.event_name != 'pull_request'
        run: docker push docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ steps.prep.outputs.tag }}

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy Notification
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy Notification
    needs: build-and-scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Send SMTP Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[${{ github.ref_name }}] ${{ needs.build-and-scan.outputs.service_name }} deployed successfully"
          body: |
            Service:      ${{ needs.build-and-scan.outputs.service_name }}
            Version:      ${{ needs.build-and-scan.outputs.image_tag }}
            Branch:       ${{ github.ref_name }}
            Environment:  ${{ github.ref_name == 'main' && 'production' || 'development' }}
            Triggered by: ${{ github.actor }}
            Commit:       ${{ github.sha }}
            Run:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_USERNAME }}
          from: "GitHub Actions <${{ secrets.EMAIL_USERNAME }}>"