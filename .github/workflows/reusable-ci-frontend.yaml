name: Reusable Frontend CI/CD

on:
  workflow_call:
    inputs:
      trigger_event:
        required: true
        type: string
      source_sha:
        required: true
        type: string
      service_name:
        required: true
        type: string
      image_name:
        required: true
        type: string
      helm_values_key:
        required: true
        type: string
      dev_manifest_path:
        required: true
        type: string
      docker_context:
        required: false
        default: "."
        type: string
      dockerfile_path:
        required: false
        default: "./Dockerfile"
        type: string
      working_directory:
        required: false
        default: "."
        type: string
      node_version:
        required: false
        default: "20"
        type: string
      install_command:
        required: false
        default: "npm install"
        type: string
      test_command:
        required: false
        default: "npm test --if-present"
        type: string
      application_build_command:
        required: false
        default: "npm run build"
        type: string
      snyk_severity_threshold:
        required: false
        default: "high"
        type: string
      sonar_key:
        required: true
        type: string
      ghcr_namespace:
        required: false
        default: "nimesh-capstone-project"
        type: string
      infra_repository:
        required: false
        default: "Nimesh-Capstone-Project/Parking-System"
        type: string
      infra_ref:
        required: false
        default: "master"
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_URL:
        required: true
      SNYK_TOKEN:
        required: true
      TOKEN:
        required: true
      EMAIL_USERNAME:
        required: false
      EMAIL_PASSWORD:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  security-scan:
    name: Security and Quality Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Service Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install Dependencies
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.install_command }}

      - name: Run Tests
        if: ${{ inputs.test_command != '' }}
        continue-on-error: true
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.test_command }}

      - name: Run Application Build
        if: ${{ inputs.application_build_command != '' }}
        continue-on-error: true
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.application_build_command }}

      - name: SonarQube Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}
        with:
          projectBaseDir: ${{ inputs.working_directory }}
          args: -Dsonar.projectKey=${{ inputs.sonar_key }}

      - name: SonarQube Quality Gate
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

      - name: Snyk Open Source Scan
        continue-on-error: true
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=${{ inputs.snyk_severity_threshold }} --all-projects

  build-and-scan:
    name: Build and Container Scan
    needs: security-scan
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.meta.outputs.image_repository }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      repository_parameter: ${{ steps.meta.outputs.repository_parameter }}
      tag_parameter: ${{ steps.meta.outputs.tag_parameter }}
      built_at: ${{ steps.meta.outputs.built_at }}
    steps:
      - name: Checkout Service Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.TOKEN }}

      - name: Prepare Metadata
        id: meta
        shell: bash
        env:
          GHCR_NAMESPACE: ${{ inputs.ghcr_namespace }}
          IMAGE_NAME: ${{ inputs.image_name }}
          HELM_VALUES_KEY: ${{ inputs.helm_values_key }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          ghcr_namespace="$(echo "${GHCR_NAMESPACE}" | tr '[:upper:]' '[:lower:]')"
          image_repository="ghcr.io/${ghcr_namespace}/${IMAGE_NAME}"
          built_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          echo "image_repository=${image_repository}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "repository_parameter=${HELM_VALUES_KEY}.deployment.containers[0].image.repository" >> "$GITHUB_OUTPUT"
          echo "tag_parameter=${HELM_VALUES_KEY}.deployment.containers[0].image.tag" >> "$GITHUB_OUTPUT"
          echo "built_at=${built_at}" >> "$GITHUB_OUTPUT"

      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile_path }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.image_repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Vulnerability Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.meta.outputs.image_repository }}:${{ steps.meta.outputs.image_tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Push Image to GHCR
        if: ${{ inputs.trigger_event == 'push' }}
        shell: bash
        run: docker push "${{ steps.meta.outputs.image_repository }}:${{ steps.meta.outputs.image_tag }}"

  update-dev-manifest:
    name: Update Dev ArgoCD Manifest
    needs: build-and-scan
    if: ${{ inputs.trigger_event == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.infra_repository }}
          ref: ${{ inputs.infra_ref }}
          token: ${{ secrets.TOKEN }}
          path: infra-repo

      - name: Install yq
        shell: bash
        run: |
          sudo wget -q https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Update Dev Manifest
        shell: bash
        env:
          DEV_MANIFEST: infra-repo/${{ inputs.dev_manifest_path }}
          IMAGE_REPOSITORY: ${{ needs.build-and-scan.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build-and-scan.outputs.image_tag }}
          BUILT_AT: ${{ needs.build-and-scan.outputs.built_at }}
          BUILT_BY: ${{ github.actor }}
          REPOSITORY_PARAMETER: ${{ needs.build-and-scan.outputs.repository_parameter }}
          TAG_PARAMETER: ${{ needs.build-and-scan.outputs.tag_parameter }}
        run: |
          repo_count="$(yq '.spec.source.helm.parameters | map(select(.name == strenv(REPOSITORY_PARAMETER))) | length' "${DEV_MANIFEST}")"
          tag_count="$(yq '.spec.source.helm.parameters | map(select(.name == strenv(TAG_PARAMETER))) | length' "${DEV_MANIFEST}")"

          if [[ "${repo_count}" != "1" || "${tag_count}" != "1" ]]; then
            echo "Expected image repository and tag Helm parameters in ${DEV_MANIFEST}"
            exit 1
          fi

          yq -i '
            (.spec.source.helm.parameters[] | select(.name == strenv(REPOSITORY_PARAMETER)).value) = strenv(IMAGE_REPOSITORY) |
            (.spec.source.helm.parameters[] | select(.name == strenv(TAG_PARAMETER)).value) = strenv(IMAGE_TAG) |
            .metadata.annotations."ci.smartparking.io/last-built-sha" = strenv(IMAGE_TAG) |
            .metadata.annotations."ci.smartparking.io/last-built-at" = strenv(BUILT_AT) |
            .metadata.annotations."ci.smartparking.io/last-built-by" = strenv(BUILT_BY)
          ' "${DEV_MANIFEST}"

      - name: Commit Dev Manifest Changes
        shell: bash
        working-directory: infra-repo
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ needs.build-and-scan.outputs.image_tag }}
        run: |
          if git diff --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.dev_manifest_path }}"
          git commit -m "ci: update ${SERVICE_NAME} dev image to ${IMAGE_TAG}"
          git push origin "HEAD:${{ inputs.infra_ref }}"

  notify:
    name: Send Deployment Notification
    needs:
      - build-and-scan
      - update-dev-manifest
    if: ${{ inputs.trigger_event == 'push' && secrets.EMAIL_USERNAME != '' && secrets.EMAIL_PASSWORD != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send SMTP Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[dev] ${{ inputs.service_name }} updated to ${{ needs.build-and-scan.outputs.image_tag }}"
          body: |
            Service:      ${{ inputs.service_name }}
            Environment:  development
            Image:        ${{ needs.build-and-scan.outputs.image_repository }}:${{ needs.build-and-scan.outputs.image_tag }}
            Triggered by: ${{ github.actor }}
            Commit:       ${{ inputs.source_sha }}
            Run:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_USERNAME }}
          from: "GitHub Actions <${{ secrets.EMAIL_USERNAME }}>"
