environment: ""

rollout:
  enabled: true

rolloutStrategy:
  default:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}
  dev:
    steps:
      - setWeight: 50
  prod:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}

authService:
  enabled: true
  configMap:
    name: auth-configmap
    data:
      PORT: "4001"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "*"
      SEED_ADMIN_EMAIL: "admin@parking.com"
      SEED_USER_EMAIL: "user@parking.com"
  secret:
    name: auth-secret
    type: Opaque
    data:
      MONGO_URI: "bW9uZ29kYjovL21vbmdvLXN2YzoyNzAxNy9hdXRoZGI="
      JWT_SECRET: "c21hcnRwYXJraW5nX3N1cGVyX3NlY3JldA=="
      SEED_ADMIN_PASSWORD: "QWRtaW5AMTIz"
      SEED_USER_PASSWORD: "VXNlckAxMjM="
  deployment:
    name: auth-deploy
    replicas: 1
    selectorLabels:
      app: sps-auth
    podLabels:
      app: sps-auth
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    containers:
      - name: auth-container
        image:
          repository: ghcr.io/nimesh-capstone-project/auth-service
          tag: v1.0.0
        ports:
          - containerPort: 4001
        envFromConfigMaps:
          - auth-configmap
        envFromSecrets:
          - auth-secret
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
  service:
    name: auth-service
    selectorLabels:
      app: sps-auth
    ports:
      - port: 80
        targetPort: 4001
    type: ClusterIP
