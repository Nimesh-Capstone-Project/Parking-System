environment: ""

rollout:
  enabled: true

rolloutStrategy:
  default:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}
  dev:
    steps:
      - setWeight: 50
  prod:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}

notificationService:
  enabled: true
  configMap:
    name: notification-configmap
    data:
      PORT: "4006"
      CORS_ORIGIN: "*"
  secret:
    name: notification-secret
    type: Opaque
    data:
      MONGO_URI: "bW9uZ29kYjovL21vbmdvLXN2YzoyNzAxNy9ub3RpZmljYXRpb25kYg=="
      JWT_SECRET: "c21hcnRwYXJraW5nX3N1cGVyX3NlY3JldA=="
      INTERNAL_API_KEY: "c21hcnRwYXJraW5nX2ludGVybmFsX2tleQ=="
  deployment:
    name: notification-deploy
    replicas: 1
    selectorLabels:
      app: sps-notification
    podLabels:
      app: sps-notification
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    containers:
      - name: notification-container
        image:
          repository: ghcr.io/nimesh-capstone-project/notification-service
          tag: v1.0.7
        ports:
          - containerPort: 4006
        envFromConfigMaps:
          - notification-configmap
        envFromSecrets:
          - notification-secret
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
  service:
    name: notification-service
    selectorLabels:
      app: sps-notification
    ports:
      - port: 80
        targetPort: 4006
    type: ClusterIP
