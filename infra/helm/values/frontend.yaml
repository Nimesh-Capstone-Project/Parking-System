environment: ""

rollout:
  enabled: true

rolloutStrategy:
  default:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}
  dev:
    steps:
      - setWeight: 50
  prod:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}

frontend:
  enabled: true
  configMap:
    name: frontend-configmap
    data:
      VITE_AUTH_SERVICE_URL: "/auth"
      VITE_PARKING_SERVICE_URL: "/parking"
      VITE_BOOKING_SERVICE_URL: "/booking"
      VITE_PAYMENT_SERVICE_URL: "/payment"
      VITE_NOTIFICATION_SERVICE_URL: "/notification"
  secret:
    name: frontend-secret
    type: Opaque
    data:
      VITE_RAZORPAY_KEY_ID: "cnpwX3Rlc3RfU2hGRk14YTlKa3FtWnU="
  deployment:
    name: frontend-deploy
    replicas: 1
    selectorLabels:
      app: sps-frontend
    podLabels:
      app: sps-frontend
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    containers:
      - name: frontend-container
        image:
          repository: ghcr.io/nimesh-capstone-project/frontend
          tag: v1.1.3
        ports:
          - containerPort: 80
        envFromConfigMaps:
          - frontend-configmap
        envFromSecrets:
          - frontend-secret
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
  service:
    name: frontend-svc
    selectorLabels:
      app: sps-frontend
    ports:
      - port: 80
        targetPort: 80
    type: ClusterIP
