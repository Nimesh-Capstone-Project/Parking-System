environment: ""

rollout:
  enabled: true

rolloutStrategy:
  default:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}
  dev:
    steps:
      - setWeight: 50
  prod:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: {}

parkingService:
  enabled: true
  configMap:
    name: parking-configmap
    data:
      PORT: "4002"
      CORS_ORIGIN: "*"
  secret:
    name: parking-secret
    type: Opaque
    data:
      MONGO_URI: "bW9uZ29kYjovL21vbmdvLXN2YzoyNzAxNy9wYXJraW5nZGI="
      JWT_SECRET: "c21hcnRwYXJraW5nX3N1cGVyX3NlY3JldA=="
      INTERNAL_API_KEY: "c21hcnRwYXJraW5nX2ludGVybmFsX2tleQ=="
  deployment:
    name: parking-deploy
    replicas: 1
    selectorLabels:
      app: sps-parking
    podLabels:
      app: sps-parking
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    containers:
      - name: parking-container
        image:
          repository: ghcr.io/nimesh-capstone-project/parking-service
          tag: v1.0.0
        ports:
          - containerPort: 4002
        envFromConfigMaps:
          - parking-configmap
        envFromSecrets:
          - parking-secret
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
  service:
    name: parking-service
    selectorLabels:
      app: sps-parking
    ports:
      - port: 80
        targetPort: 4002
    type: ClusterIP
