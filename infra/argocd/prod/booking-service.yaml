apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-parking-prod-booking-service
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    ci.smartparking.io/last-release-sha: "0765630c67ad40cb43139e8e6b01e723fe8de12f"
    ci.smartparking.io/last-release-tag: "v1.0.7"
    ci.smartparking.io/last-released-at: "2026-04-27T13:06:50Z"
    ci.smartparking.io/last-released-by: "nimeshsv814"
spec:
  project: default
  source:
    repoURL: https://github.com/Nimesh-Capstone-Project/Parking-System.git
    targetRevision: master
    path: infra/helm
    helm:
      valueFiles:
        - values/booking-service.yaml
      parameters:
        - name: bookingService.deployment.containers[0].image.repository
          value: ghcr.io/nimesh-capstone-project/booking-service
        - name: bookingService.deployment.containers[0].image.tag
          value: v1.0.7
      values: |
        namespace: prod
        authService:
          enabled: false
        frontend:
          enabled: false
        gatewayApi:
          gateway:
            enabled: false
          httpRoute:
            enabled: false
        mongo:
          enabled: false
        notificationService:
          enabled: false
        parkingService:
          enabled: false
        paymentService:
          enabled: false
        schedulerService:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
