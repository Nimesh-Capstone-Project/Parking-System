apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-parking-prod-frontend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    ci.smartparking.io/last-release-sha: "bb8defd5b38f5e26596311ba8a293f5beb67bfdc"
    ci.smartparking.io/last-release-tag: "v1.0.7"
    ci.smartparking.io/last-released-at: "2026-04-27T11:46:47Z"
    ci.smartparking.io/last-released-by: "nimeshsv814"
spec:
  project: default
  source:
    repoURL: https://github.com/Nimesh-Capstone-Project/Parking-System.git
    targetRevision: master
    path: infra/helm
    helm:
      valueFiles:
        - values/frontend.yaml
      parameters:
        - name: frontend.deployment.containers[0].image.repository
          value: ghcr.io/nimesh-capstone-project/frontend
        - name: frontend.deployment.containers[0].image.tag
          value: v1.0.7
      values: |
        namespace: prod
        authService:
          enabled: false
        bookingService:
          enabled: false
        gatewayApi:
          gateway:
            enabled: false
          httpRoute:
            enabled: false
        mongo:
          enabled: false
        notificationService:
          enabled: false
        parkingService:
          enabled: false
        paymentService:
          enabled: false
        schedulerService:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
