apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-deploy
  namespace: sps-ns
spec:
  replicas: 2
  minReadySeconds: 10
  selector:
    matchLabels:
      app: sps-mongo
  template:
    metadata:
      labels:
        app: sps-mongo
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mongodb-cont
          image: mongo
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          volumeMounts:
            - name: mongo-vct
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-vct
      spec:
        accessModes: ["ReadWriteMany"]
        storageClassName: "storage"
        resources:
          requests:
            storage: 2Gi
    

    