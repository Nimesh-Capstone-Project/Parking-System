apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  namespace: sps-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sps-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: sps-frontend
    spec:
      containers:
        - name: frontend-container
          image: nimeshsv814/frontend:v1.1.0
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: frontend-configmap
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"